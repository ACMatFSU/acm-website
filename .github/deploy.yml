name: Deploy React App to cPanel

on:
  push:
    branches:
      - prod # Triggers the workflow on pushes to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment with caching for faster builds
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies and build production assets
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      # Step 4: Deploy to A2 Hosting via rsync over SSH
      - name: Deploy Assets via rsync
        uses: Burnett01/rsync-deployments@v7.0.1
        with:
          switches: -avzr --delete
          rsh: ssh -p 2200 # A2 Hosting standard SSH port
          path: dist/ # ⚠️ Change to 'build/' if your project is not using Vite
          remote_path: /home/fsu/public_html/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          remote_pass: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          exclude: |
            .well-known/
            .tmb/
            .htaccess