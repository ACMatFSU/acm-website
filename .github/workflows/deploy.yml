name: Deploy React App to cPanel

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Keeps Node 24 runners happy without deprecation notices
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Deploy Assets via rsync
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          ARGS: -avzr --delete
          # Verified: easingthemes expects a clean, comma-separated string without extra spaces or inner quotes
          EXCLUDE: "/.well-known/,/.tmb/,/.htaccess"
          SOURCE: "dist/" # Leave as dist/ for Vite, switch to build/ if needed
          REMOTE_HOST: ${{ secrets.DEPLOY_HOST }}
          REMOTE_PORT: "22" # Shifting to standard SSH port 22
          REMOTE_USER: ${{ secrets.DEPLOY_USER }}
          TARGET: /home/fsu/public_html/