name: Deploy React App to cPanel

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies and build production assets
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      # Step 4: Deploy to A2 Hosting via Secure FTP
      - name: Deploy Assets via SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_FTP_PASSWORD }} # Uses the new secret you just created
          port: 21 # Connects through standard cPanel FTP channels
          local-dir: ./dist/
          server-dir: ./public_html/
          # Keeps your backend routes and cPanel system folders perfectly safe
          exclude: |
            **/.well-known/**
            **/.tmb/**
            **/.htaccess