name: Deploy React App to cPanel

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Deploy Assets via rsync
        uses: burnett01/rsync-deployments@v8 # Points cleanly to the v8 major release branch
        with:
          # Exclusions are completely safe inside the switches string to avoid wiping server directories
          switches: -avzr --delete --exclude=".well-known/" --exclude=".tmb/" --exclude=".htaccess"
          path: dist/ 
          remote_path: /home/fsu/public_html/
          remote_host: ${{ secrets.DEPLOY_HOST }}
          remote_port: 2200
          remote_user: ${{ secrets.DEPLOY_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
          strict_hostkeys_checking: "false"
          legacy_allow_rsa_hostkeys: "true" # Forces compliance if cPanel uses an older RSA algorithm